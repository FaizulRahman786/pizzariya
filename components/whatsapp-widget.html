<!-- Premium Emerald Green Messenger Floating Widget -->
<div id="green-messenger-container">
  <div class="messenger-chat-box">
    <div class="messenger-header">
      <div class="messenger-profile-info">
        <h4 id="msg-advisor-name">Gourmet Advisor</h4>
        <span id="msg-advisor-status">Online</span>
      </div>
      <div class="messenger-header-actions">
        <button class="messenger-action-btn messenger-minimize-btn" id="messenger-minimize-btn" aria-label="Minimize Chat">
          <i class="fa-solid fa-minus"></i>
        </button>
        <button class="messenger-action-btn messenger-close-btn" id="messenger-close-btn" aria-label="Close Chat">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
    </div>
    <div class="messenger-body" id="messenger-body">
      <div class="messenger-sender-label" id="msg-sender-label">Gourmet Advisor</div>
      <div class="messenger-bubble incoming">
        <span id="msg-welcome-text">Namaste! How can I assist with your gourmet confectionery selection and table reservations tonight?</span><br>
        <span class="messenger-author" id="msg-author-name">- Saffron Lounge Host</span>
        <span class="messenger-time">10:00 AM</span>
      </div>
      <div class="messenger-whatsapp-card">
        <div class="whatsapp-card-title" id="msg-whatsapp-title">CONNECT VIA WHATSAPP</div>
        <p id="msg-whatsapp-desc">Prefer WhatsApp? Click below for personalized support.</p>
        <a href="https://wa.me/917858062571" target="_blank" class="messenger-whatsapp-btn" id="msg-whatsapp-link" rel="noopener noreferrer">
          <i class="fa-brands fa-whatsapp"></i> <span id="msg-whatsapp-btn-text">Chat on WhatsApp</span>
        </a>
      </div>
    </div>
    <div class="messenger-footer">
      <input type="text" class="messenger-input" id="messenger-input" placeholder="Type your message..." />
      <button class="messenger-send-btn" id="messenger-send-btn" aria-label="Send Message">
        <i class="fa-solid fa-paper-plane"></i>
      </button>
    </div>
  </div>
  <button class="messenger-button" id="messenger-toggle-btn" aria-label="Toggle Chat Window">
    <i class="fa-solid fa-comments"></i>
    <span class="notification-badge">1</span>
  </button>
</div>
