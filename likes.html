<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <script>
    (function () {
      const savedTheme = localStorage.getItem('anamika-theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your Favorites — ANAMIKA SWEETS. View and manage your hand-picked premium traditional sweets and mains. Add items directly to your shopping cart.">
  <meta name="theme-color" content="#f97316">
  <meta property="og:type" content="restaurant">
  <meta property="og:site_name" content="Anamika Sweets">
  <meta property="og:locale" content="en_IN">
  <meta property="og:title" content="Your Favorites — ANAMIKA SWEETS">
  <meta property="og:description" content="Saharanpur's finest destination for premium sweets, fine bakery items, North Indian cuisine, and party packages.">
  <meta property="og:image" content="https://anamisweat.vercel.app/green_messenger_preview.png">
  <meta property="og:url" content="https://anamisweat.vercel.app/likes.html">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Your Favorites — ANAMIKA SWEETS">
  <meta name="twitter:description" content="Saharanpur's finest premium sweets, bakery & restaurant.">
  <meta name="twitter:image" content="https://anamisweat.vercel.app/green_messenger_preview.png">
  <link rel="canonical" href="https://anamisweat.vercel.app/likes.html">

  <title>Your Favorites — ANAMIKA SWEETS</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap">

  <!-- Font Awesome for sleek modern vector icons -->
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Premium Custom Styling Sheet -->
  <link rel="stylesheet" href="css/style.css?v=9">

  <!-- Shared utilities, central config, layout loader, translations, and schema generators -->
  <script src="utils.js" defer></script>
  <script src="config.js" defer></script>
  <script src="layout.js?v=9" defer></script>
  <script src="translations.js?v=9" defer></script>
  <script src="schema.js" defer></script>
  <style>
      .likes-layout {
        max-width: 800px;
        margin: 0 auto;
        padding: 100px 5% 80px;
      }
  
      .likes-section-container {
        background: var(--bg-surface);
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        padding: 40px;
        box-shadow: var(--shadow);
        height: fit-content;
        width: 100%;
      }
  
      .likes-layout h1 {
        font-size: 1.8rem;
        margin-bottom: 30px;
        font-family: 'Playfair Display', serif;
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 15px;
      }
    </style>
</head>

<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <!-- Reusable component mount points -->
  <div id="preloader-mount">
    <div id="luxury-preloader">
      <div class="preloader-content">
        <div class="preloader-logo-container">
          <div class="logo-halo-ring logo-halo-1"></div>
          <div class="logo-halo-ring logo-halo-2"></div>
          <div class="logo-outer-ring"></div>
          <div class="logo-vector-badge">
            <svg class="luxury-monogram-svg" viewBox="0 0 100 100">
              <circle class="monogram-border-outer" cx="50" cy="50" r="44" fill="none"
                stroke="url(#gold-gradient-monogram)" stroke-width="1.5" />
              <circle class="monogram-border-inner" cx="50" cy="50" r="41" fill="none"
                stroke="url(#gold-gradient-monogram)" stroke-width="0.75" opacity="0.5" />
              <path class="monogram-star star-n" d="M50 12 L51.5 15 L50 18 L48.5 15 Z"
                fill="url(#gold-gradient-monogram)" />
              <path class="monogram-star star-s" d="M50 82 L51.5 85 L50 88 L48.5 85 Z"
                fill="url(#gold-gradient-monogram)" />
              <path class="monogram-star star-w" d="M12 50 L15 51.5 L18 50 L15 48.5 Z"
                fill="url(#gold-gradient-monogram)" />
              <path class="monogram-star star-e" d="M82 50 L85 51.5 L88 50 L85 48.5 Z"
                fill="url(#gold-gradient-monogram)" />
              <text class="monogram-letter" x="50" y="62" font-family="'Playfair Display', serif" font-size="34"
                font-weight="700" text-anchor="middle" fill="url(#gold-gradient-monogram)">A</text>
              <defs>
                <linearGradient id="gold-gradient-monogram" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#b38728" />
                  <stop offset="30%" stop-color="#fbf5b7" />
                  <stop offset="50%" stop-color="#da1b60" />
                  <stop offset="70%" stop-color="#fbf5b7" />
                  <stop offset="100%" stop-color="#aa771c" />
                </linearGradient>
              </defs>
            </svg>
          </div>
        </div>
        <div class="preloader-text" id="preloader-brand-name">ANAMIKA SWEETS</div>
        <div class="preloader-sub" id="preloader-tagline">SAFFRON LOUNGE</div>
      </div>
    </div>
  </div>

  <!-- Scroll Progress Indicator -->
  <div id="scroll-progress"></div>

  <!-- Navigation Bar Mount -->
  <div id="navbar-mount"></div>

  <main id="main-content">

  <!-- Banner Spacer -->
  <div style="height: 80px;"></div>

  <!-- Favorites Dashboard Content -->
  <section class="likes-layout">

    <!-- Favorites Container -->
    <div class="likes-section-container" id="likes-section">
      <h1><i class="fa-solid fa-heart" style="color: #ef4444;"></i> Your Sweet Favorites</h1>
      <div id="likes-drawer-items">
        <!-- Liked Items populate dynamically -->
      </div>
    </div>

  </section>

  <!-- Interactive Modal for Success Message (needed by form actions in case of box submission) -->
  <div class="modal" id="success-modal">
    <div class="modal-content">
      <div class="modal-body">
        <div class="modal-icon">
          <i class="fa-solid fa-check"></i>
        </div>
        <h3>Order Confirmed!</h3>
        <p class="modal-subtitle">Your details have been processed, downloaded as a receipt, and forwarded via email.
        </p>
        <pre id="modal-msg"></pre>
        <button class="btn-modal-close" id="modal-close-btn">
          <i class="fa-solid fa-circle-check"></i> Complete and Close
        </button>
      </div>
    </div>
  </div>

  <!-- Toast alerts container -->
  <div class="toast-container" id="toast-container"></div>

  </main>

  <!-- Reusable layout mount points -->
  <div id="box-builder-mount"></div>
  <div id="whatsapp-widget-mount"></div>
  <div id="mobile-actions-mount"></div>
  <div id="footer-mount"></div>

  <!-- Premium Centralized Configuration and Data -->
  <script src="data.js" defer></script>
  <!-- Premium Interactive Logic Script -->
  <script src="script.js" defer></script>

  <!-- Auto-Render triggers after Layout Components mount (ensures toastContainer, navbar badges are ready) -->
  <script>
    window.addEventListener('LayoutComponentsLoaded', () => {
      if (typeof renderLikesDrawer === 'function') {
        renderLikesDrawer();
      }
    });
  </script>
</body>

</html>
